name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        run: bash build/macos/get_ffmpeg.sh

      - name: Build with PyInstaller
        run: python build_app.py

      - name: Create zip
        run: cd dist && zip -r -y ../FileFiend-macOS-arm64.zip FileFiend.app

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: FileFiend-macOS-arm64
          path: FileFiend-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        run: python build/windows/get_ffmpeg.py

      - name: Download MediaInfo
        run: python build/windows/get_mediainfo.py

      - name: Build with PyInstaller
        run: python build_app.py

      - name: Create zip
        run: Compress-Archive -Path dist/FileFiend/* -DestinationPath FileFiend-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: FileFiend-Windows-x64
          path: FileFiend-Windows-x64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          generate_release_notes: true
          files: |
            FileFiend-macOS-arm64.zip
            FileFiend-Windows-x64.zip
